version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker image build -t syamsarosa/circleci-vke:latest .
      - run:
          name: Login to Docker CLI
          command: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - run:
          name: Push the Docker image to Docker Hub registry
          command: docker image push syamsarosa/circleci-vke:latest

  deploy:
    docker:
      - image: lachlanevenson/k8s-kubectl
    steps:
      - checkout
      - run:
          name: Decode kubeconfig
          command: echo "$KUBECONFIG_BASE64" | base64 -d > kubeconfig
      - run:
          name: Apply deployment.yaml
          command: KUBECONFIG=$(pwd)/kubeconfig kubectl apply -f deployment.yaml
      - run:
          name: Apply service.yaml
          command: KUBECONFIG=$(pwd)/kubeconfig kubectl apply -f service.yaml

workflows:
  deploy_circleci_vke:
    jobs:
      - build
      - deploy:
          requires:
            - build
